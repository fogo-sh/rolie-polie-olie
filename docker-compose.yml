version: "3.8"

services:
  bot:
    build: .
    restart: unless-stopped
    environment:
      - DISCORD_TOKEN=${DISCORD_TOKEN}
      - DISCORD_CLIENT_ID=${DISCORD_CLIENT_ID}
      - ADMIN_TOKEN=${ADMIN_TOKEN}
      - DATABASE_PATH=/data/rolebot.sqlite
      - PORT=3000
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - ./data:/data
