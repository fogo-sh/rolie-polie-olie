services:
  bot:
    build: .
    restart: unless-stopped
    environment:
      - RPO_DISCORD_TOKEN=${RPO_DISCORD_TOKEN}
      - RPO_DISCORD_CLIENT_ID=${RPO_DISCORD_CLIENT_ID}
      - RPO_DISCORD_CLIENT_SECRET=${RPO_DISCORD_CLIENT_SECRET}
      - RPO_PUBLIC_URL=${RPO_PUBLIC_URL}
      - RPO_ADMIN_USER_IDS=${RPO_ADMIN_USER_IDS}
      - RPO_DATABASE_PATH=/data/rolebot.sqlite
      - RPO_PORT=3000
    ports:
      - "${RPO_PORT:-3000}:3000"
    volumes:
      - ./data:/data
